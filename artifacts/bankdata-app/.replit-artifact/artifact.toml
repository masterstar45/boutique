kind = "web"
previewPath = "/"
title = "BANK$DATA - Mini App & Admin"
version = "1.0.0"
id = "artifacts/bankdata-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19666

[services.development]
run = "pnpm --filter @workspace/bankdata-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bankdata-app", "run", "build" ]
publicDir = "artifacts/bankdata-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19666"
BASE_PATH = "/"
